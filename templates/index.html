<!DOCTYPE html>
<html>

<head>
<title>AI Resume Analyzer</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
width:450px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
background:#667eea;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#5a67d8;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Resume Analyzer</h1>

<form action="/analyze" method="post" enctype="multipart/form-data">

<p>Upload Resume</p>

<input type="file" name="resume" required>

<br><br>

<p>Paste Job Description</p>

<textarea name="jobdesc" rows="6"></textarea>

<button type="submit">Analyze Resume</button>

</form>

</div>

</body>

</html>
