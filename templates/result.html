<!DOCTYPE html>
<html>

<head>
<title>Resume Result</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
text-align:center;
margin:0;
}

.container{
width:70%;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.section{
margin-top:25px;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f2f2f2;
margin:6px;
padding:8px;
border-radius:6px;
}

button{
margin-top:25px;
padding:12px 20px;
background:#667eea;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Resume Analysis</h1>

<h2>Resume Score: {{score}}%</h2>

<h2>Job Match: {{match}}%</h2>

<div class="section">

<h3>Skills Found</h3>

<ul>
{% for skill in skills %}
<li>{{skill}}</li>
{% endfor %}
</ul>

</div>

<div class="section">

<h3>Missing Skills</h3>

<ul>
{% for skill in missing %}
<li>{{skill}}</li>
{% endfor %}
</ul>

</div>

<div class="section">

<h3>Suggestions</h3>

<ul>
{% for s in suggestions %}
<li>{{s}}</li>
{% endfor %}
</ul>

</div>

<a href="/">
<button>Analyze Another Resume</button>
</a>

</div>

</body>

</html>
